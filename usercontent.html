  <script>
// ========== STATE ==========
let APP = {
  page: 'login',
  adminTab: 0,
  employees: [],
  workData: [],
  projects: [],
  settings: { company_name: 'PROTM Co., Ltd', whatsapp: '2055888811', phone: '2055888811' },
  allRecords: [],
  loading: false
};

const WORK_CODES = [
  { code: '1', label: 'ทำงาน', color: 'code-1' },
  { code: 'O', label: 'ครบรอบ 45 วันหยุด', color: 'code-O' },
  { code: 'OS', label: 'ส่งไปโครงการอื่น', color: 'code-OS' },
  { code: 'S', label: 'ลาป่วย', color: 'code-S' },
  { code: 'P', label: 'ลากิจ', color: 'code-P' },
  { code: 'A', label: 'ลาพักร้อนประจำปี', color: 'code-A' },
  { code: 'PTL', label: 'ลาภรรยาคลอด(ชาย)', color: 'code-PTL' },
  { code: 'ML', label: 'ลาคลอด(หญิง)', color: 'code-ML' },
  { code: 'UL', label: 'ลาหักเงิน', color: 'code-UL' },
  { code: 'HL', label: 'ลาครึ่งวัน', color: 'code-HL' },
  { code: 'WO', label: 'วันหยุดสุดสัปดาห์', color: 'code-WO' },
  { code: 'H', label: 'วันหยุดนักขัตฤกษ์', color: 'code-H' },
  { code: 'C', label: 'วันหยุดบริษัท', color: 'code-C' }
];

const DAY_NAMES_SHORT = ['อา','จ','อ','พ','พฤ','ศ','ส'];

// ========== DEFAULT CONFIG ==========
const defaultConfig = {
  primary_color: '#1e3a5f',
  surface_color: '#ffffff',
  text_color: '#1e293b',
  accent_color: '#2563eb',
  secondary_color: '#64748b',
  font_family: 'Noto Sans Thai',
  font_size: 14,
  company_name: 'PROTM Co., Ltd',
  system_title: 'ระบบติดตามวันทำงานและวันลา'
};

// ========== ELEMENT SDK ==========
if (window.elementSdk) {
  window.elementSdk.init({
    defaultConfig,
    onConfigChange: async (config) => { applyConfig(config); },
    mapToCapabilities: (config) => ({
      recolorables: [
        { get: () => config.primary_color || defaultConfig.primary_color, set: (v) => { config.primary_color = v; window.elementSdk.setConfig({ primary_color: v }); } },
        { get: () => config.surface_color || defaultConfig.surface_color, set: (v) => { config.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); } },
        { get: () => config.text_color || defaultConfig.text_color, set: (v) => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
        { get: () => config.accent_color || defaultConfig.accent_color, set: (v) => { config.accent_color = v; window.elementSdk.setConfig({ accent_color: v }); } },
        { get: () => config.secondary_color || defaultConfig.secondary_color, set: (v) => { config.secondary_color = v; window.elementSdk.setConfig({ secondary_color: v }); } }
      ],
      borderables: [],
      fontEditable: {
        get: () => config.font_family || defaultConfig.font_family,
        set: (v) => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); }
      },
      fontSizeable: {
        get: () => config.font_size || defaultConfig.font_size,
        set: (v) => { config.font_size = v; window.elementSdk.setConfig({ font_size: v }); }
      }
    }),
    mapToEditPanelValues: (config) => new Map([
      ['company_name', config.company_name || defaultConfig.company_name],
      ['system_title', config.system_title || defaultConfig.system_title]
    ])
  });
}

function applyConfig(config) {
  const c = { ...defaultConfig, ...config };
  document.documentElement.style.setProperty('--primary', c.primary_color);
  document.documentElement.style.setProperty('--surface', c.surface_color);
  document.documentElement.style.setProperty('--text', c.text_color);
  document.documentElement.style.setProperty('--accent', c.accent_color);
  document.documentElement.style.setProperty('--secondary', c.secondary_color);
  APP.settings.company_name = c.company_name;
  render();
}

// ========== DATA SDK ==========
if (window.dataSdk) {
  window.dataSdk.init({
    onDataChanged(data) {
      APP.allRecords = data;
      APP.employees = data.filter(r => r.type === 'employee');
      APP.workData = data.filter(r => r.type === 'work');
      APP.projects = data.filter(r => r.type === 'project');
      const settingsRec = data.find(r => r.type === 'settings');
      if (settingsRec) {
        APP.settings.company_name = settingsRec.name || APP.settings.company_name;
        APP.settings.whatsapp = settingsRec.whatsapp || APP.settings.whatsapp;
        APP.settings.phone = settingsRec.phone || APP.settings.phone;
      }
      render();
    }
  });
}

// ========== TOAST ==========
function showToast(msg, type='success') {
  const container = document.getElementById('toast-container');
  if (!container) return;
  const div = document.createElement('div');
  const colors = { success: 'bg-green-600', error: 'bg-red-600', info: 'bg-blue-600', warning: 'bg-yellow-600' };
  div.className = `toast-enter ${colors[type] || colors.info} text-white px-4 py-2 rounded-lg shadow-lg text-sm mb-2 flex items-center gap-2`;
  const icons = { success: 'check-circle', error: 'x-circle', info: 'info', warning: 'alert-triangle' };
  div.innerHTML = `<i data-lucide="${icons[type] || 'info'}" style="width:16px;height:16px;"></i><span>${msg}</span>`;
  container.appendChild(div);
  lucide.createIcons({ nodes: [div] });
  setTimeout(() => { div.classList.replace('toast-enter','toast-exit'); setTimeout(() => div.remove(), 300); }, 3000);
}

// ========== MODAL ==========
let modalContent = '';
function showModal(content) {
  modalContent = content;
  render();
}
function closeModal() {
  modalContent = '';
  render();
}

// ========== HELPERS ==========
function getDaysInMonth(month, year) { return new Date(year, month, 0).getDate(); }
function getDayOfWeek(year, month, day) { return new Date(year, month - 1, day).getDay(); }
function generateId() { return Date.now().toString(36) + Math.random().toString(36).substr(2, 5); }

function getMonthOptions() {
  const months = [];
  for (let i = 1; i <= 12; i++) months.push({ value: i, label: `เดือน ${i}` });
  return months;
}
function getYearOptions() {
  const now = new Date().getFullYear();
  return [now - 1, now, now + 1];
}

function getProjectName(code) {
  const p = APP.projects.find(pr => pr.proj_code === code);
  return p ? p.proj_name : code;
}

// ========== RENDER ==========
function render() {
  const app = document.getElementById('app');
  if (!app) return;

  let html = '';
  html += `<div id="toast-container" class="fixed top-4 right-4 z-[9999]"></div>`;

  if (modalContent) {
    html += `<div class="modal-backdrop fixed inset-0 bg-black/50 z-[9000] flex items-center justify-center p-4" onclick="if(event.target===this)closeModal()">

  WORK_CODES.slice(1).forEach(c => { tableHTML += `<th class="bg-gray-50" style="min-width:28px;">${c.code}</th>`; });
  tableHTML += `<\/tr>`;

  tableHTML += `<tr class="bg-gray-50"><th class="frozen frozen-id bg-gray-50"></th><th class="frozen frozen-name bg-gray-50"></th><th class="frozen frozen-pos bg-gray-50"></th><th class="frozen frozen-nat bg-gray-50"></th><th class="frozen frozen-start bg-gray-50"></th>`;

  tableHTML += `<th class="bg-green-50">Σ</th>`;

    const empWork = APP.workData.filter(w => w.emp_id === emp.emp_id && parseInt(w.work_month) === scheduleMonth && parseInt(w.work_year) === scheduleYear);
    const workMap = {};
    empWork.forEach(w => { workMap[parseInt(w.work_date)] = w.work_code; });

    tableHTML += `<tr class="hover:bg-blue-50/50"><td class="frozen frozen-id bg-white font-medium">${emp.emp_id}<\/td><td class="frozen frozen-name bg-white text-left">${emp.name}<\/td><td class="frozen frozen-pos bg-white">${emp.position || '-'}<\/td><td class="frozen frozen-nat bg-white">${emp.nationality || '-'}<\/td><td class="frozen frozen-start bg-white">${emp.start_date || '-'}<\/td>`;

    const counts = {};
    WORK_CODES.forEach(c => counts[c.code] = 0);

    for (let d = 1; d <= days; d++) {
      const dow = getDayOfWeek(scheduleYear, scheduleMonth, d);
      let code = workMap[d] || '-';

      const v = counts[c.code] || 0;
      tableHTML += `<td class="${v > 0 ? c.color : ''}">${v || ''}<\/td>`;

function openCellPicker(empId, day) {
  const existing = APP.workData.find(w => w.emp_id === empId && parseInt(w.work_date) === day && parseInt(w.work_month) === scheduleMonth && parseInt(w.work_year) === scheduleYear);
  const currentCode = existing ? existing.work_code : '-';

  const content = `
    <div class="p-4">
      <h3 class="text-sm font-bold mb-3">เลือกสถานะ - วันที่ ${day}/${scheduleMonth}/${scheduleYear}</h3>
      <div class="grid grid-cols-4 gap-2">
        <button onclick="setCellCode('${empId}',${day},'-')" class="p-2 text-xs rounded-lg border ${currentCode === '-' ? 'ring-2 ring-blue-500' : ''} hover:bg-gray-100">- ล้าง</button>
        ${WORK_CODES.map(c => `<button onclick="setCellCode('${empId}',${day},'${c.code}')" class="p-2 text-xs rounded-lg ${c.color} ${currentCode === c.code ? 'ring-2 ring-blue-500' : ''} hover:opacity-80">${c.code}</button>`).join('')}
      </div>
    </div>`;
  showModal(content);
}

async function setCellCode(empId, day, code) {
  closeModal();
  const existing = APP.workData.find(w => w.emp_id === empId && parseInt(w.work_date) === day && parseInt(w.work_month) === scheduleMonth && parseInt(w.work_year) === scheduleYear);

  if (code === '-' && existing) {
    const res = await window.dataSdk.delete(existing);
    if (res.isOk) showToast('ลบเรียบร้อย');
    else showToast('เกิดข้อผิดพลาด', 'error');
  } else if (existing) {
    existing.work_code = code;
    const res = await window.dataSdk.update(existing);
    if (res.isOk) showToast(`เปลี่ยนเป็น ${code}`);
    else showToast('เกิดข้อผิดพลาด', 'error');
  } else if (code !== '-') {
    if (APP.allRecords.length >= 999) { showToast('ข้อมูลเต็มแล้ว (999)', 'warning'); return; }
    const res = await window.dataSdk.create({ type: 'work', emp_id: empId, work_date: String(day), work_month: String(scheduleMonth), work_year: String(scheduleYear), work_code: code });
    if (res.isOk) showToast(`บันทึก ${code}`);
    else showToast('เกิดข้อผิดพลาด', 'error');
  }
}

let day45Project = 'all';

function render45DayTab() {
  const projectOpts = APP.projects.map(p => `<option value="${p.proj_code}" ${day45Project === p.proj_code ? 'selected' : ''}>${p.proj_code}: ${p.proj_name}</option>`).join('');

  const rows = emps.map((emp, idx) => {
    const empWork = APP.workData.filter(w => w.emp_id === emp.emp_id);
    const totalWork = empWork.filter(w => w.work_code === '1').length;
    const usedO = empWork.filter(w => w.work_code === 'O').length;
    const earnedO = Math.floor(totalWork / 45) * 6;
    const remaining = earnedO - usedO;
    let status = '', statusClass = '';
    if (remaining > 0) { status = 'ปกติ ใช้ได้'; statusClass = 'text-green-600 bg-green-50'; }
    else if (remaining === 0 && earnedO > 0) { status = 'หมดแล้ว'; statusClass = 'text-yellow-600 bg-yellow-50'; }
    else if (remaining < 0) { status = 'ใช้เกิน!'; statusClass = 'text-red-600 bg-red-50'; }
    else { status = 'ยังไม่มีสิทธิ'; statusClass = 'text-gray-400 bg-gray-50'; }

    return `<tr class="hover:bg-blue-50/50 border-b">
      <td class="px-2 py-2 text-xs">${idx + 1}<\/td>
      <td class="px-2 py-2 text-xs font-medium">${emp.name}<\/td>
      <td class="px-2 py-2 text-xs">${emp.department || '-'}<\/td>
      <td class="px-2 py-2 text-xs">${emp.position || '-'}<\/td>
      <td class="px-2 py-2 text-xs">${emp.start_date || '-'}<\/td>
      <td class="px-2 py-2 text-xs text-center font-bold">${totalWork}<\/td>
      <td class="px-2 py-2 text-xs text-center font-bold text-blue-600">${earnedO}<\/td>
      <td class="px-2 py-2 text-xs text-center font-bold text-orange-600">${usedO}<\/td>
      <td class="px-2 py-2 text-xs text-center font-bold ${remaining < 0 ? 'text-red-600' : 'text-green-600'}">${remaining}<\/td>
      <td class="px-2 py-2"><span class="text-[10px] px-2 py-0.5 rounded-full font-medium ${statusClass}">${status}<\/span><\/td>
     <\/tr>`;
  });

  return `
  <div class="space-y-3">
    <div class="flex gap-2 items-center">
      <select onchange="day45Project=this.value;render();" class="text-xs border rounded-lg px-3 py-2 bg-white">
        <option value="all">ทั้งหมด</option>${projectOpts}
      </select>
    </div>
    <div class="bg-white rounded-xl shadow overflow-x-auto">
      <table class="w-full text-left">
        <thead><tr class="bg-gray-50 border-b">
          <th class="px-2 py-2 text-[10px] text-gray-500">#</th>
          <th class="px-2 py-2 text-[10px] text-gray-500">ชื่อ</th>
          <th class="px-2 py-2 text-[10px] text-gray-500">แผนก</th>
          <th class="px-2 py-2 text-[10px] text-gray-500">ตำแหน่ง</th>
          <th class="px-2 py-2 text-[10px] text-gray-500">เริ่มนับ</th>
          <th class="px-2 py-2 text-[10px] text-gray-500 text-center">รวมงาน</th>
          <th class="px-2 py-2 text-[10px] text-gray-500 text-center">O มี</th>
          <th class="px-2 py-2 text-[10px] text-gray-500 text-center">ใช้แล้ว</th>
          <th class="px-2 py-2 text-[10px] text-gray-500 text-center">ยังเหลือ</th>
          <th class="px-2 py-2 text-[10px] text-gray-500">สถานะ</th>
         <\/tr><\/thead>
        <tbody>${rows.length ? rows.join('') : '<tr><td colspan="10" class="text-center text-gray-400 py-8 text-sm">ยังไม่มีข้อมูล<\/td><\/tr>'}<\/tbody>
       <\/table>
    </div>
    <div class="bg-blue-50 rounded-xl p-3 text-xs text-blue-700 space-y-1">
      <p class="font-semibold">📌 กฎการคำนวณ:</p>
      <p>• ทำงานครบ 45 วัน = ได้หยุด 6 วัน (O)</p>
      <p>• ทำงานครบ 90 วัน = ได้หยุด 12 วัน</p>
      <p>• ถ้า มี 6, ใช้ 6, เหลือ 0 → หมด</p>
      <p>• ถ้า มี 0, ใช้ 6, เหลือ -6 → ใช้เกิน!</p>
    </div>

  const existing = APP.allRecords.find(r => r.type === 'settings');
  if (existing) {

  } else {
    if (APP.allRecords.length >= 999) { showToast('ข้อมูลเต็ม', 'warning'); return; }
    const res = await window.dataSdk.create({ type: 'project', proj_code: code, proj_name: name });

// ========== EXPORT ==========
function exportScheduleExcel() {
  const days = getDaysInMonth(scheduleMonth, scheduleYear);
  const emps = scheduleProject === 'all' ? APP.employees : APP.employees.filter(e => e.project === scheduleProject);
  let csv = '\uFEFF';
  csv += 'ID,ชื่อ,ตำแหน่ง,สัญชาติ,เริ่มงาน';
  for (let d = 1; d <= days; d++) csv += `,${d}`;
  WORK_CODES.forEach(c => csv += `,${c.code}`);
  csv += '\n';

  emps.forEach(emp => {
    const empWork = APP.workData.filter(w => w.emp_id === emp.emp_id && parseInt(w.work_month) === scheduleMonth && parseInt(w.work_year) === scheduleYear);
    const workMap = {};
    empWork.forEach(w => { workMap[parseInt(w.work_date)] = w.work_code; });
    const counts = {};
    WORK_CODES.forEach(c => counts[c.code] = 0);

    csv += `${emp.emp_id},"${emp.name}","${emp.position || ''}","${emp.nationality || ''}","${emp.start_date || ''}"`;
    for (let d = 1; d <= days; d++) {
      const code = workMap[d] || '-';
      if (code !== '-') counts[code] = (counts[code] || 0) + 1;
      csv += `,${code}`;
    }
    WORK_CODES.forEach(c => csv += `,${counts[c.code] || 0}`);
    csv += '\n';
  });

  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `Schedule_${scheduleMonth}_${scheduleYear}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('Export สำเร็จ!');
}

function attachEvents() {
  const loginBtn = document.getElementById('btn-login');
  if (loginBtn) {

      const id = document.getElementById('login-id')?.value?.trim();
      if (!id) { showToast('กรุณากรอกรหัส', 'warning'); return; }
      if (id === '336699') {
        APP.page = 'admin';
        showToast('ยินดีต้อนรับ Admin!');
        render();
      } else {
        showToast('รหัสไม่ถูกต้อง', 'error');
      }
    });
  }
  const loginInput = document.getElementById('login-id');
  if (loginInput) {
    loginInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); loginBtn?.click(); }
    });
  }
}
